version: "0.1.0"
description: >
  wolfSSH client component for ESP-IDF.  Wraps wolfSSH in a FreeRTOS task
  with a clean callback API.  Ships with a pre-tuned user_settings.h for
  ESP32 targets.

url: https://github.com/dmatking/esp-wolfssh-client
repository: https://github.com/dmatking/esp-wolfssh-client
license: Apache-2.0
maintainers:
  - dmatking@yahoo.com

dependencies:
  idf: ">=5.4.0"
  wolfssl/wolfssl: ">=5.7.0"
